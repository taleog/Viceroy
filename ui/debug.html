<!DOCTYPE html>
<html>
<head>
    <title>Viceroy Debug</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .test { margin: 10px 0; padding: 10px; background: #2d2d30; }
        .pass { border-left: 4px solid #0f0; }
        .fail { border-left: 4px solid #f00; }
        button { padding: 8px 16px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Viceroy Debug Panel</h1>
    
    <div id="tests"></div>
    
    <div style="margin-top: 20px;">
        <button onclick="testSearch()">Test Search</button>
        <button onclick="testApps()">Test App Discovery</button>
        <button onclick="testClipboard()">Test Clipboard</button>
    </div>
    
    <div id="output" style="margin-top: 20px; padding: 10px; background: #2d2d30;"></div>

    <script>
        const { invoke } = window.__TAURI__.tauri;
        const testsDiv = document.getElementById('tests');
        const outputDiv = document.getElementById('output');
        
        function log(msg) {
            outputDiv.innerHTML += msg + '<br>';
            console.log(msg);
        }
        
        function addTest(name, passed) {
            const div = document.createElement('div');
            div.className = 'test ' + (passed ? 'pass' : 'fail');
            div.textContent = (passed ? '✓' : '✗') + ' ' + name;
            testsDiv.appendChild(div);
        }
        
        // Run tests on load
        (async () => {
            log('Starting tests...');
            
            // Test Tauri API
            addTest('Tauri API available', !!window.__TAURI__);
            
            // Test invoke
            try {
                await invoke('get_settings');
                addTest('Tauri invoke works', true);
            } catch (e) {
                addTest('Tauri invoke works', false);
                log('Invoke error: ' + e);
            }
            
            log('Tests complete');
        })();
        
        async function testSearch() {
            log('Testing search...');
            try {
                const results = await invoke('search', { query: 'test' });
                log('Search results: ' + JSON.stringify(results, null, 2));
            } catch (e) {
                log('Search error: ' + e);
            }
        }
        
        async function testApps() {
            log('Testing app discovery...');
            try {
                const results = await invoke('search', { query: 'safari' });
                log('App results: ' + JSON.stringify(results, null, 2));
            } catch (e) {
                log('App error: ' + e);
            }
        }
        
        async function testClipboard() {
            log('Testing clipboard...');
            try {
                const history = await invoke('get_clipboard_history', { limit: 5 });
                log('Clipboard history: ' + JSON.stringify(history, null, 2));
            } catch (e) {
                log('Clipboard error: ' + e);
            }
        }
    </script>
</body>
</html>
