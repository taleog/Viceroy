<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Viceroy symbol</title>
  <desc id="desc">Viceroy symbol with slightly wider stacked chevrons and a thinner lower gray chevron.</desc>

  <defs>
    <linearGradient id="bg" x1="0.12" y1="0.08" x2="0.90" y2="0.92">
      <stop offset="0" stop-color="#192028"/>
      <stop offset="0.58" stop-color="#101821"/>
      <stop offset="1" stop-color="#0B1016"/>
    </linearGradient>

    <linearGradient id="gold" x1="0.18" y1="0.10" x2="0.85" y2="0.88">
      <stop offset="0" stop-color="#E8CB79"/>
      <stop offset="1" stop-color="#C9A55F"/>
    </linearGradient>

    <linearGradient id="white" x1="0.18" y1="0.10" x2="0.85" y2="0.88">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D8D8D8"/>
    </linearGradient>

    <linearGradient id="gray" x1="0.18" y1="0.10" x2="0.85" y2="0.88">
      <stop offset="0" stop-color="#9AA0A6"/>
      <stop offset="1" stop-color="#686E75"/>
    </linearGradient>

    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.18"/>
    </filter>

    <filter id="layerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="10" stdDeviation="4" flood-color="#000" flood-opacity="0.23"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="none"/>

  <g filter="url(#layerShadow)">
    <!-- Top V: slightly longer and more open -->
    <path d="M 288 286 L 514 456 L 742 286 L 742 379 L 514 549 L 288 379 Z" fill="url(#gold)"/>

    <!-- Middle V: slightly longer/open, similar thickness -->
    <path d="M 300 444 L 514 606 L 728 444 L 728 517 L 514 679 L 300 517 Z" fill="url(#white)"/>

    <!-- Bottom V: thinner than before, a touch longer/open -->
    <path d="M 316 586 L 514 736 L 712 586 L 712 638 L 514 788 L 316 638 Z" fill="url(#gray)"/>
  </g>
</svg>
