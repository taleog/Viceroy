name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (for example v0.1.0-alpha.2)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
      
      - name: Build release binary
        run: cargo build --release
      
      - name: Build app bundle
        run: ./build_app.sh
      
      - name: Resolve release tag
        id: release_ref
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create ZIP of app bundle
        run: |
          cd .
          zip -r Viceroy-${{ steps.release_ref.outputs.tag }}.zip Viceroy.app
      
      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 target/release/viceroy | cut -d ' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"
      
      - name: Generate release notes
        id: release_notes
        run: |
          # Extract changelog section for this version
          VERSION=${{ steps.release_ref.outputs.version }}
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1 }
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" { exit }
            capture { print }
          ' CHANGELOG.md > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release $VERSION" > /tmp/release_notes.md
          fi

          echo "Generated release notes for $VERSION"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_ref.outputs.tag }}
          name: Viceroy ${{ steps.release_ref.outputs.version }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(steps.release_ref.outputs.tag, 'alpha') || contains(steps.release_ref.outputs.tag, 'beta') }}
          files: |
            target/release/viceroy
            Viceroy-${{ steps.release_ref.outputs.tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create update metadata JSON
        run: |
          cat > latest.json << EOF
          {
            "version": "${{ steps.release_ref.outputs.version }}",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.release_ref.outputs.tag }}/viceroy",
            "sha256": "${{ steps.sha256.outputs.sha256 }}"
          }
          EOF
          cat latest.json
      
      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-metadata
          path: latest.json
          retention-days: 90
