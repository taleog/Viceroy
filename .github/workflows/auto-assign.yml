name: Auto Assign Issues

on:
  issue_comment:
    types: [created]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: >
      !github.event.issue.pull_request &&
      (contains(github.event.comment.body, "/assign") || 
       contains(github.event.comment.body, "I want to work on this") ||
       contains(github.event.comment.body, "I'll take this"))
    steps:
      - name: Assign commenter to issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const commenter = context.payload.comment.user.login;
            
            // Check if issue is already assigned
            if (issue.assignees && issue.assignees.length > 0) {
              const currentAssignees = issue.assignees.map(a => a.login).join(', ');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `This issue is already assigned to ${currentAssignees}. Please coordinate with them or pick another issue.`
              });
              return;
            }
            
            // Assign the commenter
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [commenter]
            });
            
            // Add acknowledgement comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Thanks @${commenter}! You've been assigned to this issue. Happy coding! 🎉\n\nPlease see [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md) for development guidelines.`
            });
            
            // Add "in progress" label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['in progress']
            });
            
            console.log(`Assigned ${commenter} to issue #${issue.number}`);
