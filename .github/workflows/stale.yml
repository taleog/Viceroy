name: Manage Stale Issues

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity. 
            It will be closed in 14 days if no further activity occurs.
            
            If this issue is still relevant:
            - Add a comment with an update
            - Remove the `stale` label
            
            Thank you for your contributions to Viceroy!
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs.
            
            If this PR is still in progress:
            - Add a comment with an update
            - Push new commits
            - Remove the `stale` label
          close-issue-message: |
            This issue was closed automatically due to inactivity.
            Feel free to reopen it if it's still relevant!
          close-pr-message: |
            This pull request was closed automatically due to inactivity.
            Feel free to reopen it if you'd like to continue working on it!
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,priority:high'
          exempt-pr-labels: 'pinned,security,priority:high'
          operations-per-run: 100
